# HACS + hassfest validation workflow.
# Source: https://www.hacs.xyz/docs/publish/action/
# Runs on GitHub Actions only (GitLab's self-hosted Kubernetes runner has privileged=false
# and cannot run hacs/action which requires DinD).
# Triggered once this file is mirrored to the public GitHub repo (Plan 05-02).
---
name: Validate

on:
  push:
  pull_request:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions: {}

jobs:
  validate-hacs:
    runs-on: ubuntu-latest
    steps:
      - name: HACS validation
        uses: "hacs/action@main"
        with:
          category: "integration"
          ignore: "brands topics issues description"

  validate-hassfest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: home-assistant/actions/hassfest@master

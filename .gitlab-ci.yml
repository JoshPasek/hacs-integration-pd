# Phase 2 CI — 2-stage pipeline: lint + test on python:3.13-slim with the full
# pytest-homeassistant-custom-component harness installed via `.[dev]`.
# Phase 5 will add: HACS action (against GitHub mirror) + real hassfest.
#
# Note: the original plan called for a docker-based `hassfest` validate-stage job.
# This runner (Kubernetes executor) does not permit DinD / privileged mode, and the
# plan's scripted fallback (`python -m script.hassfest`) is not shippable — that
# module lives in the home-assistant/core git repo, not in the PyPI package.
# Bespoke `tests/test_integration_manifest.py` covers the same structural validation
# (enum values, required fields, semver, URL shapes). Real hassfest + HACS action
# are deferred to Phase 5 where they run against the GitHub mirror.

stages:
  - lint
  - test

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  PYTHONDONTWRITEBYTECODE: "1"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"

default:
  image: python:3.13-slim
  cache:
    key: pip-$CI_COMMIT_REF_SLUG
    paths:
      - .cache/pip/

ruff:
  stage: lint
  script:
    - pip install --quiet ruff==0.15.11
    - ruff check .
    - ruff format --check .

pytest:
  stage: test
  script:
    # editable_mode=compat makes setuptools add the repo to sys.path instead of
    # installing an editable finder hook; HA's _get_custom_components iterates
    # custom_components.__path__ and iterdir()'s each entry, which the finder-hook
    # path fails with FileNotFoundError. "compat" mode avoids the hook entirely.
    - pip install --quiet -e ".[dev]" --config-settings editable_mode=compat
    - pytest tests/ -v

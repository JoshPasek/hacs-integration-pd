# Phase 2 CI — 2-stage pipeline: lint + test on python:3.13-slim with the full
# pytest-homeassistant-custom-component harness installed via `.[dev]`.
# Phase 4 adds a `test-card` Node 22 stage (image: node:22-alpine) for the
# Lovelace card workspace — typecheck + build + @web/test-runner + grep gates.
# Phase 5 will add: HACS action (against GitHub mirror) + real hassfest.
#
# Note: the original plan called for a docker-based `hassfest` validate-stage job.
# This runner (Kubernetes executor) does not permit DinD / privileged mode, and the
# plan's scripted fallback (`python -m script.hassfest`) is not shippable — that
# module lives in the home-assistant/core git repo, not in the PyPI package.
# Bespoke `tests/test_integration_manifest.py` covers the same structural validation
# (enum values, required fields, semver, URL shapes). Real hassfest + HACS action
# are deferred to Phase 5 where they run against the GitHub mirror.
#
# Node 22-alpine fallback (Phase 4 research override #2):
# If Alpine Chromium's V8 coverage API proves unreliable on the self-hosted runner,
# swap `image: node:22-alpine` for `image: mcr.microsoft.com/playwright:v1.x-jammy`
# which ships the canonical Chromium. No other changes required; playwright auto-detects.

stages:
  - lint
  - test
  - mirror

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  PYTHONDONTWRITEBYTECODE: "1"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  NPM_CONFIG_CACHE: "$CI_PROJECT_DIR/.cache/npm"

default:
  image: python:3.13-slim
  cache:
    key: pip-$CI_COMMIT_REF_SLUG
    paths:
      - .cache/pip/

ruff:
  stage: lint
  script:
    - pip install --quiet ruff==0.15.11
    - ruff check .
    - ruff format --check .

pytest:
  stage: test
  before_script:
    # python:3.13-slim lacks gcc; lru-dict (transitive dep of pytest-homeassistant-custom-component)
    # requires compilation. Install build-essential to provide gcc.
    # Phase 5 research override: pre-existing CI failure discovered during mirror pipeline trigger.
    - apt-get update -qq && apt-get install -y --no-install-recommends build-essential
  script:
    # editable_mode=compat makes setuptools add the repo to sys.path instead of
    # installing an editable finder hook; HA's _get_custom_components iterates
    # custom_components.__path__ and iterdir()'s each entry, which the finder-hook
    # path fails with FileNotFoundError. "compat" mode avoids the hook entirely.
    - pip install --quiet -e ".[dev]" --config-settings editable_mode=compat
    - pytest tests/ -v

# NEW — Phase 4
# Phase 5 research override: node:22-alpine + system Chromium does not work with
# @web/test-runner-playwright (playwrightLauncher), which looks for Playwright's own
# chrome-headless-shell binary (not the system chromium-browser). Switched to the
# official Playwright jammy image which ships the exact binary Playwright expects.
# Playwright version must match the version in package-lock.json (currently 1.59.1).
test-card:
  stage: test
  image: mcr.microsoft.com/playwright:v1.59.1-jammy
  cache:
    key: npm-playwright-$CI_COMMIT_REF_SLUG
    paths:
      - .cache/npm/
      - www/community/party-dispenser-card/node_modules/
  script:
    - cd www/community/party-dispenser-card
    - npm ci
    - npm run typecheck
    - npm run build      # rollup -> dist/ -> copied to ../../../custom_components/party_dispenser/frontend/
    - npm test           # web-test-runner; coverageConfig.threshold gates >=70%
    # Grep gates (UI-SPEC §3.1 no-hardcoded-hex + §19.1 no-fetch UI-05):
    - |
      if grep -rE '#[0-9a-fA-F]{3,6}' src/ | grep -v ':host'; then
        echo "FAIL: hex color outside :host fallback block (UI-SPEC §3.1 grep gate)"
        exit 1
      fi
    - |
      if grep -rE '\bfetch\s*\(' src/; then
        echo "FAIL: direct fetch() call (REQ UI-05 forbids browser->backend network calls)"
        exit 1
      fi
  coverage: '/Total:\s*\d+\.?\d+%/'
  artifacts:
    when: always
    paths:
      - www/community/party-dispenser-card/coverage/
      - www/community/party-dispenser-card/dist/
      - custom_components/party_dispenser/frontend/
    reports:
      coverage_report:
        coverage_format: cobertura
        path: www/community/party-dispenser-card/coverage/cobertura-coverage.xml

# Phase 5 — Tag-triggered GitHub mirror push.
# Runs ONLY on semver tags (vX.Y.Z); branches and non-semver tags do not trigger this job.
# Requires GitLab CI variables: GITHUB_MIRROR_PAT (masked+protected), GITHUB_MIRROR_OWNER, GITHUB_MIRROR_REPO.
# PAT scope: Contents Read/Write + Workflows Read/Write (fine-grained).
# See .planning/phases/05-ci-github-mirror-release-automation/05-RESEARCH.md § Pattern 1.
#
# Note on tag event reliability (Research Pitfall 1 / Open Question 4):
# When git push --mirror creates multiple refs simultaneously on a fresh repo, GitHub
# may not fire push:tags workflow events for each individual tag. To guarantee the
# release.yml workflow fires, we delete the tag on GitHub via API then re-push it alone
# after the bulk mirror push. This ensures a clean push:tags event triggers release.yml.
mirror-to-github:
  stage: mirror
  image: alpine:latest
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/
  variables:
    GIT_STRATEGY: none
  script:
    - apk add --no-cache git ca-certificates curl
    - git clone --bare "${CI_REPOSITORY_URL}" repo.git
    - cd repo.git
    - git push --mirror "https://oauth2:${GITHUB_MIRROR_PAT}@github.com/${GITHUB_MIRROR_OWNER}/${GITHUB_MIRROR_REPO}.git"
    # Re-push the semver tag as an isolated push to guarantee the push:tags GitHub Actions
    # event fires (Pitfall 1: bulk --mirror pushes may not trigger per-ref events).
    - |
      echo "Re-pushing tag ${CI_COMMIT_TAG} to guarantee GitHub Actions release workflow triggers..."
      curl -s -X DELETE \
        -H "Authorization: Bearer ${GITHUB_MIRROR_PAT}" \
        -H "Accept: application/vnd.github+json" \
        "https://api.github.com/repos/${GITHUB_MIRROR_OWNER}/${GITHUB_MIRROR_REPO}/git/refs/tags/${CI_COMMIT_TAG}" \
        -w "Delete tag HTTP: %{http_code}\n" || true
      sleep 3
      git push --force "https://oauth2:${GITHUB_MIRROR_PAT}@github.com/${GITHUB_MIRROR_OWNER}/${GITHUB_MIRROR_REPO}.git" "refs/tags/${CI_COMMIT_TAG}"
      echo "Tag ${CI_COMMIT_TAG} re-pushed."
